<text x="56" y="86" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="800" letter-spacing="2" fill="#2B6CB0">HOW IT WORKS</text><g filter="url(#sh)"><rect x="160" y="140" width="480" height="78" rx="16" fill="#FFFFFF" stroke="#D9E5F0" stroke-width="1.5"/></g><text x="400.0" y="175.0" font-family="Inter, Segoe UI, sans-serif" font-size="25" font-weight="600" fill="#0B1C2C" text-anchor="middle">You plug in a device</text><text x="400.0" y="200.0" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#52677C" text-anchor="middle">Keyboard, drive, camera</text><line x1="400.0" y1="222" x2="400.0" y2="234" stroke="#2B6CB0" stroke-width="3"/><path d="M400.0 244 l-7 -12 l7 4 l7 -4 z" fill="#2B6CB0"/><g filter="url(#sh)"><rect x="160" y="250" width="480" height="78" rx="16" fill="#2B6CB0" stroke="#2B6CB0" stroke-width="2.5"/></g><text x="400.0" y="285.0" font-family="Inter, Segoe UI, sans-serif" font-size="25" font-weight="600" fill="#FFFFFF" text-anchor="middle">USB host + hub driver</text><text x="400.0" y="310.0" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Detects and enumerates</text><line x1="400.0" y1="332" x2="400.0" y2="344" stroke="#2B6CB0" stroke-width="3"/><path d="M400.0 354 l-7 -12 l7 4 l7 -4 z" fill="#2B6CB0"/><g filter="url(#sh)"><rect x="160" y="360" width="480" height="78" rx="16" fill="#FFFFFF" stroke="#D9E5F0" stroke-width="1.5"/></g><text x="400.0" y="395.0" font-family="Inter, Segoe UI, sans-serif" font-size="25" font-weight="600" fill="#0B1C2C" text-anchor="middle">Class / device driver</text><text x="400.0" y="420.0" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#52677C" text-anchor="middle">Loads the right software</text><line x1="400.0" y1="442" x2="400.0" y2="454" stroke="#2B6CB0" stroke-width="3"/><path d="M400.0 464 l-7 -12 l7 4 l7 -4 z" fill="#2B6CB0"/><g filter="url(#sh)"><rect x="160" y="470" width="480" height="78" rx="16" fill="#FFFFFF" stroke="#D9E5F0" stroke-width="1.5"/></g><text x="400.0" y="505.0" font-family="Inter, Segoe UI, sans-serif" font-size="25" font-weight="600" fill="#0B1C2C" text-anchor="middle">It just works</text><text x="400.0" y="530.0" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#52677C" text-anchor="middle">Ready in a second</text><text x="400" y="556" font-family="Inter, Segoe UI, sans-serif" font-size="16" fill="#52677C" text-anchor="middle">The quiet choreography of plug-and-play</text>
