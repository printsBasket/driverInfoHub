<text x="56" y="86" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="800" letter-spacing="2" fill="#0A59C0">COMMON FIX</text><g filter="url(#sh)"><rect x="120" y="150" width="560" height="120" rx="18" fill="#FFFFFF" stroke="#D97706" stroke-width="2"/></g><circle cx="170" cy="210" r="20" fill="#D97706" opacity="0.15"/><text x="170" y="219" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="800" fill="#B45309" text-anchor="middle">!</text><text x="210" y="200" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="600" fill="#0B1C2C">Won't pair, or drops after sleep</text><text x="210" y="232" font-family="Inter, Segoe UI, sans-serif" font-size="15" fill="#52677C">Stale pairing or a parked radio</text><line x1="400" y1="280" x2="400" y2="330" stroke="#0A59C0" stroke-width="3.5"/><path d="M400 340 l-8 -14 l8 5 l8 -5 z" fill="#0A59C0"/><g filter="url(#sh)"><rect x="280" y="290" width="240" height="40" rx="20" fill="#0A59C0"/></g><text x="400" y="316" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Clean reinstall</text><g filter="url(#sh)"><rect x="120" y="360" width="560" height="120" rx="18" fill="#FFFFFF" stroke="#2E7D5B" stroke-width="2"/></g><circle cx="170" cy="420" r="20" fill="#2E7D5B" opacity="0.15"/><path d="M160 420 l7 7 l13 -14" stroke="#2E7D5B" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="210" y="410" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="600" fill="#0B1C2C">Pairs and stays connected</text><text x="210" y="442" font-family="Inter, Segoe UI, sans-serif" font-size="15" fill="#52677C">Re-paired fresh, power-saving off</text><text x="400" y="556" font-family="Inter, Segoe UI, sans-serif" font-size="16" fill="#52677C" text-anchor="middle">Remove the device, update the driver, re-pair</text>
