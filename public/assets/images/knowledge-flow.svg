<text x="56" y="86" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="800" letter-spacing="2" fill="#0096D6">THE REPAIR ROUTINE</text><g filter="url(#sh)"><rect x="120" y="140" width="560" height="78" rx="16" fill="#FFFFFF" stroke="#D9E5F0" stroke-width="1.5"/></g><circle cx="170" cy="179" r="22" fill="#0096D6" opacity="1"/><text x="170" y="188" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="middle">1</text><text x="210" y="173" font-family="Inter, Segoe UI, sans-serif" font-size="23" font-weight="600" fill="#0B1C2C">Restart properly</text><text x="210" y="200" font-family="Inter, Segoe UI, sans-serif" font-size="15" fill="#52677C">Clears stuck driver state</text><line x1="170" y1="218" x2="170" y2="238" stroke="#0096D6" stroke-width="3"/><g filter="url(#sh)"><rect x="120" y="238" width="560" height="78" rx="16" fill="#FFFFFF" stroke="#D9E5F0" stroke-width="1.5"/></g><circle cx="170" cy="277" r="22" fill="#0096D6" opacity="1"/><text x="170" y="286" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="middle">2</text><text x="210" y="271" font-family="Inter, Segoe UI, sans-serif" font-size="23" font-weight="600" fill="#0B1C2C">Check cables &amp; links</text><text x="210" y="298" font-family="Inter, Segoe UI, sans-serif" font-size="15" fill="#52677C">Rule out the boring stuff</text><line x1="170" y1="316" x2="170" y2="336" stroke="#0096D6" stroke-width="3"/><g filter="url(#sh)"><rect x="120" y="336" width="560" height="78" rx="16" fill="#FFFFFF" stroke="#D9E5F0" stroke-width="1.5"/></g><circle cx="170" cy="375" r="22" fill="#0096D6" opacity="1"/><text x="170" y="384" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="middle">3</text><text x="210" y="369" font-family="Inter, Segoe UI, sans-serif" font-size="23" font-weight="600" fill="#0B1C2C">Reseat the device</text><text x="210" y="396" font-family="Inter, Segoe UI, sans-serif" font-size="15" fill="#52677C">Force a clean re-detect</text><line x1="170" y1="414" x2="170" y2="434" stroke="#0096D6" stroke-width="3"/><g filter="url(#sh)"><rect x="120" y="434" width="560" height="78" rx="16" fill="#0096D6" stroke="#0096D6" stroke-width="2.5"/></g><circle cx="170" cy="473" r="22" fill="#FFFFFF" opacity="0.2"/><text x="170" y="482" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="middle">4</text><text x="210" y="467" font-family="Inter, Segoe UI, sans-serif" font-size="23" font-weight="600" fill="#FFFFFF">Reinstall the driver</text><text x="210" y="494" font-family="Inter, Segoe UI, sans-serif" font-size="15" fill="#FFFFFF">Remove old, install latest</text><text x="400" y="556" font-family="Inter, Segoe UI, sans-serif" font-size="16" fill="#52677C" text-anchor="middle">Work top to bottom — most problems stop early</text>
</svg>